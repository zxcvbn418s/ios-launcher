name: Build Production Android Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android Project Safely
        run: |
          rm -rf android
          flutter create --platforms android --org com.liquid.glasslauncher --project-name glass_launcher .

      - name: Inject Production Dependencies (pubspec.yaml)
        run: |
          cat << 'EOF' > pubspec.yaml
          name: glass_launcher
          description: "A Professional Production Liquid Glass iOS Launcher"
          publish_to: 'none'
          version: 1.0.2+10

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            device_apps: ^2.2.0
            permission_handler: ^11.3.1

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: Inject Full Liquid Glass Core Source Code
        run: |
          rm -f lib/main.dart
          mkdir -p lib
          
          cat << 'EOF' > lib/main.dart
          import 'dart:ui';
          import 'package:flutter/material.dart';
          import 'package:device_apps/device_apps.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() {
            runApp(const GlassLauncherApp());
          }

          class GlassLauncherApp extends StatelessWidget {
            const GlassLauncherApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Liquid Glass Launcher 2026',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: Colors.black,
                  useMaterial3: true,
                ),
                home: const MainLauncherStructure(),
              );
            }
          }

          class MainLauncherStructure extends StatefulWidget {
            const MainLauncherStructure({super.key});

            @override
            State<MainLauncherStructure> createState() => _MainLauncherStructureState();
          }

          class _MainLauncherStructureState extends State<MainLauncherStructure> {
            bool _isLocked = true;
            bool _isControlCenterOpen = false;
            bool _isIslandExpanded = false;
            List<Application> _installedApps = [];
            bool _isLoadingApps = true;
            final PageController _pageController = PageController(initialPage: 0);
            int _currentPage = 0;

            @override
            void initState() {
              super.initState();
              _loadAppsAndPermissions();
            }

            Future<void> _loadAppsAndPermissions() async {
              await Permission.ignoreBatteryOptimizations.request();
              try {
                List<Application> apps = await DeviceApps.getInstalledApplications(
                  includeSystemApps: true,
                  onlyAppsWithLaunchIntent: true,
                  includeAppIcons: true,
                );
                apps.sort((a, b) => a.appName.toLowerCase().compareTo(b.appName.toLowerCase()));
                setState(() {
                  _installedApps = apps;
                  _isLoadingApps = false;
                });
              } catch (e) {
                setState(() => _isLoadingApps = false);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    Positioned.fill(
                      child: Container(
                        decoration: const BoxDecoration(
                          gradient: LinearGradient(
                            begin: Alignment.topLeft,
                            end: Alignment.bottomRight,
                            colors: [
                              Color(0xFF0F101A),
                              Color(0xFF141A29),
                              Color(0xFF1B1224),
                              Color(0xFF07070A),
                            ],
                          ),
                        ),
                      ),
                    ),

                    _isLocked ? _buildLockScreen() : _buildMainWorkspace(),

                    AnimatedPositioned(
                      duration: const Duration(milliseconds: 400),
                      curve: Curves.fastOutSlowIn,
                      top: _isControlCenterOpen ? 0 : -MediaQuery.of(context).size.height,
                      left: 0,
                      right: 0,
                      height: MediaQuery.of(context).size.height,
                      child: _buildControlCenterWidget(),
                    ),
                  ],
                ),
              );
            }

            Widget _buildLockScreen() {
              return GestureDetector(
                onVerticalDragEnd: (details) {
                  if (details.primaryVelocity! < -100) {
                    setState(() => _isLocked = false);
                  }
                },
                child: Container(
                  color: Colors.transparent,
                  width: double.infinity,
                  height: double.infinity,
                  child: SafeArea(
                    child: Column(
                      children: [
                        const SizedBox(height: 60),
                        const Icon(Icons.lock_open_rounded, color: Colors.white70, size: 26),
                        const SizedBox(height: 16),
                        const Text(
                          '09:41',
                          style: TextStyle(fontSize: 88, fontWeight: FontWeight.w200, color: Colors.white, letterSpacing: -2),
                        ),
                        const Text(
                          'Sunday, June 28',
                          style: TextStyle(fontSize: 22, fontWeight: FontWeight.w400, color: Colors.white70),
                        ),
                        const Spacer(),
                        Column(
                          children: [
                            const Icon(Icons.keyboard_arrow_up_rounded, color: Colors.white60, size: 32),
                            Text(
                              'Swipe up to unlock',
                              style: TextStyle(color: Colors.white.withOpacity(0.6), fontSize: 15, fontWeight: FontWeight.w500, letterSpacing: 0.5),
                            ),
                          ],
                        ),
                        const SizedBox(height: 50),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _buildMainWorkspace() {
              return SafeArea(
                child: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 8),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.spaceBetween,
                        children: [
                          const Text('9:41', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15, color: Colors.white)),
                          GestureDetector(
                            onTap: () => setState(() => _isControlCenterOpen = true),
                            child: const Row(
                              children: [
                                Icon(Icons.signal_cellular_alt_rounded, size: 17, color: Colors.white),
                                SizedBox(width: 5),
                                Icon(Icons.wifi_rounded, size: 17, color: Colors.white),
                                SizedBox(width: 5),
                                Icon(Icons.battery_full_rounded, color: Colors.greenAccent, size: 18),
                                SizedBox(width: 4),
                                Text('85%', style: TextStyle(fontSize: 13, fontWeight: FontWeight.bold, color: Colors.white)),
                              ],
                            ),
                          ),
                        ],
                      ),
                    ),

                    GestureDetector(
                      onTap: () => setState(() => _isIslandExpanded = !_isIslandExpanded),
                      child: AnimatedContainer(
                        duration: const Duration(milliseconds: 350),
                        curve: Curves.fastOutSlowIn,
                        width: _isIslandExpanded ? MediaQuery.of(context).size.width * 0.92 : 120,
                        height: _isIslandExpanded ? 80 : 32,
                        decoration: BoxDecoration(
                          color: Colors.black,
                          borderRadius: BorderRadius.circular(24),
                          border: Border.all(color: Colors.white.withOpacity(0.05)),
                        ),
                        padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 4),
                        child: _isIslandExpanded ? _expandedIslandContent() : _compactIslandContent(),
                      ),
                    ),
                    const SizedBox(height: 12),

                    Expanded(
                      child: PageView(
                        controller: _pageController,
                        onPageChanged: (int page) => setState(() => _currentPage = page),
                        children: [
                          _buildUnifiedMainScreen(), 
                          _buildProductionAppGrid(),  
                        ],
                      ),
                    ),

                    Row(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: List.generate(2, (index) => AnimatedContainer(
                        duration: const Duration(milliseconds: 250),
                        margin: const EdgeInsets.symmetric(horizontal: 5),
                        width: _currentPage == index ? 20 : 8,
                        height: 8,
                        decoration: BoxDecoration(
                          color: _currentPage == index ? Colors.white : Colors.white24,
                          borderRadius: BorderRadius.circular(4),
                        ),
                      )),
                    ),
                    const SizedBox(height: 12),

                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 10),
                      child: ClipRRect(
                        borderRadius: BorderRadius.circular(32),
                        child: BackdropFilter(
                          filter: ImageFilter.blur(sigmaX: 35, sigmaY: 35),
                          child: Container(
                            padding: const EdgeInsets.symmetric(vertical: 14, horizontal: 16),
                            decoration: BoxDecoration(
                              color: Colors.white.withOpacity(0.06),
                              borderRadius: BorderRadius.circular(32),
                              border: Border.all(color: Colors.white.withOpacity(0.18)),
                            ),
                            child: Row(
                              mainAxisAlignment: MainAxisAlignment.spaceAround,
                              children: _buildStaticDockIcons(),
                            ),
                          ),
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }

            Widget _compactIslandContent() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Icon(Icons.lens, color: Colors.lightGreenAccent, size: 6),
                  Icon(Icons.bolt, color: Colors.amberAccent, size: 12),
                ],
              );
            }

            Widget _expandedIslandContent() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Row(
                    children: [
                      Icon(Icons.music_note_rounded, color: Colors.pinkAccent, size: 28),
                      SizedBox(width: 12),
                      Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('Obsidian Echoes', style: TextStyle(fontSize: 14, fontWeight: FontWeight.bold, color: Colors.white)),
                          Text('Music Form - Now Playing', style: TextStyle(color: Colors.white60, fontSize: 11)),
                        ],
                      ),
                    ],
                  ),
                  Icon(Icons.waves_rounded, color: Colors.cyanAccent, size: 22),
                ],
              );
            }

            Widget _buildUnifiedMainScreen() {
              return Padding(
                padding: const EdgeInsets.symmetric(horizontal: 24.0, vertical: 16.0),
                child: Center(
                  child: ClipRRect(
                    borderRadius: BorderRadius.circular(32),
                    child: BackdropFilter(
                      filter: ImageFilter.blur(sigmaX: 30, sigmaY: 30),
                      child: Container(
                        padding: const EdgeInsets.all(28),
                        decoration: BoxDecoration(
                          color: Colors.white.withOpacity(0.06),
                          borderRadius: BorderRadius.circular(32),
                          border: Border.all(color: Colors.white.withOpacity(0.15)),
                        ),
                        child: Column(
                          mainAxisSize: MainAxisSize.min,
                          children: [
                            const Text(
                              '09:41',
                              style: TextStyle(fontSize: 76, fontWeight: FontWeight.w300, color: Colors.white, letterSpacing: -1),
                            ),
                            const SizedBox(height: 2),
                            const Text(
                              'Thursday, Jun 25, 2026',
                              style: TextStyle(fontSize: 17, color: Colors.white70, fontWeight: FontWeight.w400),
                            ),
                            const SizedBox(height: 20),
                            Container(height: 1, color: Colors.white12),
                            const SizedBox(height: 20),
                            const Row(
                              mainAxisAlignment: MainAxisAlignment.spaceAround,
                              children: [
                                Column(
                                  children: [
                                    Icon(Icons.wb_sunny_rounded, color: Colors.orangeAccent, size: 28),
                                    SizedBox(height: 6),
                                    Text('24°C', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16, color: Colors.white)),
                                  ],
                                ),
                                Column(
                                  children: [
                                    Icon(Icons.bolt_rounded, color: Colors.greenAccent, size: 28),
                                    SizedBox(height: 6),
                                    Text('Optimized', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 16, color: Colors.white)),
                                  ],
                                ),
                              ],
                            )
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }

            Widget _buildProductionAppGrid() {
              if (_isLoadingApps) {
                return const Center(child: CircularProgressIndicator(color: Colors.white));
              }
              return GridView.builder(
                padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 12),
                itemCount: _installedApps.length,
                gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                  crossAxisCount: 4,
                  mainAxisSpacing: 22,
                  crossAxisSpacing: 16,
                  childAspectRatio: 0.82,
                ),
                itemBuilder: (context, index) {
                  Application app = _installedApps[index];
                  return GestureDetector(
                    onTap: () => DeviceApps.openApp(app.packageName),
                    child: Column(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        Container(
                          width: 58,
                          height: 58,
                          decoration: BoxDecoration(
                            borderRadius: BorderRadius.circular(16),
                            boxShadow: [
                              BoxShadow(
                                color: Colors.cyanAccent.withOpacity(0.15),
                                blurRadius: 12,
                                offset: const Offset(0, 4),
                              )
                            ],
                          ),
                          child: ClipRRect(
                            borderRadius: BorderRadius.circular(16),
                            child: app is ApplicationWithIcon 
                              ? Image.memory(app.icon, fit: BoxFit.cover)
                              : const Icon(Icons.android, size: 32, color: Colors.white),
                          ),
                        ),
                        const SizedBox(height: 6),
                        Text(
                          app.appName,
                          style: const TextStyle(color: Colors.white, fontSize: 11, fontWeight: FontWeight.w400),
                          maxLines: 1,
                          overflow: TextOverflow.ellipsis,
                          textAlign: TextAlign.center,
                        ),
                      ],
                    ),
                  );
                },
              );
            }

            List<Widget> _buildStaticDockIcons() {
              final List<MapEntry<IconData, Color>> dockData = [
                const MapEntry(Icons.phone_rounded, Colors.green),
                const MapEntry(Icons.message_rounded, Colors.lightBlue),
                const MapEntry(Icons.language_rounded, Colors.blueAccent),
                const MapEntry(Icons.chat_bubble_rounded, Colors.teal),
              ];

              return dockData.map((entry) {
                return Container(
                  width: 56,
                  height: 56,
                  decoration: BoxDecoration(
                    color: entry.value.withOpacity(0.85),
                    borderRadius: BorderRadius.circular(16),
                    boxShadow: [
                      BoxShadow(color: entry.value.withOpacity(0.3), blurRadius: 10, offset: const Offset(0, 3))
                    ]
                  ),
                  child: Icon(entry.key, color: Colors.white, size: 26),
                );
              }).toList();
            }

            Widget _buildControlCenterWidget() {
              return ClipRRect(
                child: BackdropFilter(
                  filter: ImageFilter.blur(sigmaX: 35, sigmaY: 35),
                  child: Container(
                    color: Colors.black.withOpacity(0.6),
                    padding: const EdgeInsets.fromLTRB(24, 60, 24, 30),
                    child: Column(
                      children: [
                        Row(
                          children: [
                            Expanded(
                              child: Container(
                                height: 135,
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(20),
