name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Specific Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Force Clean and Recreate Modern Android Structure
        run: |
          rm -rf android
          flutter create --platforms android --org com.example.ioslauncher --project-name ios_launcher .

      - name: Inject Glassmorphism Codes Directly
        run: |
          rm -f lib/main.dart
          rm -f lib/home_screen.dart
          
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'home_screen.dart';

          void main() {
            runApp(const IOSLauncherApp());
          }

          class IOSLauncherApp extends StatelessWidget {
            const IOSLauncherApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'iOS Launcher Liquid Glass',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: Colors.black,
                  useMaterial3: true,
                ),
                home: const MainContainer(),
              );
            }
          }

          class MainContainer extends StatefulWidget {
            const MainContainer({super.key});

            @override
            State<MainContainer> createState() => _MainContainerState();
          }

          class _MainContainerState extends State<MainContainer> {
            bool isLocked = true;

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    // ایجاد بک‌گراند گرادیان نئونی و شیک به صورت کد رندر شده (بدون نیاز به اینترنت و کش)
                    Positioned.fill(
                      child: Container(
                        decoration: const BoxDecoration(
                          gradient: LinearGradient(
                            begin: Alignment.topLeft,
                            end: Alignment.bottomRight,
                            colors: [
                              Color(0xFF1A1B2F),
                              Color(0xFF162A45),
                              Color(0xFF251A35),
                              Color(0xFF0F1016),
                            ],
                          ),
                        ),
                      ),
                    ),
                    isLocked
                        ? LockScreen(onUnlock: () => setState(() => isLocked = false))
                        : const HomeScreen(),
                  ],
                ),
              );
            }
          }

          class LockScreen extends StatelessWidget {
            final VoidCallback onUnlock;
            const LockScreen({super.key, required this.onUnlock});

            @override
            Widget build(BuildContext context) {
              return Container(
                color: Colors.black.withOpacity(0.2),
                child: SafeArea(
                  child: Column(
                    children: [
                      const SizedBox(height: 60),
                      const Icon(Icons.lock_outline, color: Colors.white, size: 30),
                      const SizedBox(height: 16),
                      const Text(
                        '09:41',
                        style: TextStyle(fontSize: 84, fontWeight: FontWeight.w200, color: Colors.white, letterSpacing: -2),
                      ),
                      const Text(
                        'Sunday, June 28',
                        style: TextStyle(fontSize: 22, fontWeight: FontWeight.w400, color: Colors.white70),
                      ),
                      const Spacer(),
                      GestureDetector(
                        onTap: onUnlock,
                        child: Container(
                          margin: const EdgeInsets.only(bottom: 60),
                          padding: const EdgeInsets.symmetric(horizontal: 40, vertical: 16),
                          decoration: BoxDecoration(
                            color: Colors.white.withOpacity(0.08),
                            borderRadius: BorderRadius.circular(32),
                            border: Border.all(color: Colors.white24),
                          ),
                          child: const Row(
                            mainAxisSize: MainAxisSize.min,
                            children: [
                              Text('Tap to Unlock ', style: TextStyle(color: Colors.white, fontSize: 16, fontWeight: FontWeight.w600)),
                              Icon(Icons.arrow_forward_ios, color: Colors.white, size: 14),
                            ],
                          ),
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          cat << 'EOF' > lib/home_screen.dart
          import 'dart:ui';
          import 'package:flutter/material.dart';

          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});

            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            bool isIslandExpanded = false;
            bool isControlCenterOpen = false;
            double brightnessValue = 0.7;
            double volumeValue = 0.5;
            final PageController _pageController = PageController();
            int _currentPage = 0;

            @override
            Widget build(BuildContext context) {
              return Stack(
                children: [
                  SafeArea(
                    child: Column(
                      children: [
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 6),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              const Text('9:41', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15)),
                              GestureDetector(
                                onTap: () => setState(() => isControlCenterOpen = true),
                                child: const Row(
                                  children: [
                                    Icon(Icons.signal_cellular_alt, size: 18),
                                    SizedBox(width: 6),
                                    Icon(Icons.wifi, size: 18),
                                    SizedBox(width: 6),
                                    Icon(Icons.battery_full, color: Colors.green, size: 18),
                                    SizedBox(width: 4),
                                    Text('85%', style: TextStyle(fontSize: 12, fontWeight: FontWeight.bold)),
                                  ],
                                ),
                              ),
                            ],
                          ),
                        ),
                        const SizedBox(height: 4),
                        GestureDetector(
                          onTap: () => setState(() => isIslandExpanded = !isIslandExpanded),
                          child: AnimatedContainer(
                            duration: const Duration(milliseconds: 350),
                            curve: Curves.fastOutSlowIn,
                            width: isIslandExpanded ? MediaQuery.of(context).size.width * 0.92 : 115,
                            height: isIslandExpanded ? 80 : 30,
                            decoration: BoxDecoration(
                              color: Colors.black,
                              borderRadius: BorderRadius.circular(22),
                              boxShadow: [BoxShadow(color: Colors.black.withOpacity(0.5), blurRadius: 15)]
                            ),
                            padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 4),
                            child: isIslandExpanded ? _buildExpandedIsland() : _buildCompactIsland(),
                          ),
                        ),
                        const SizedBox(height: 20),
                        Expanded(
                          child: PageView(
                            controller: _pageController,
                            onPageChanged: (int page) => setState(() => _currentPage = page),
                            children: [
                              _buildAppGrid(),
                              _buildWidgetPage(),
                            ],
                          ),
                        ),
                        Row(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: List.generate(2, (index) => AnimatedContainer(
                            duration: const Duration(milliseconds: 200),
                            margin: const EdgeInsets.symmetric(horizontal: 4),
                            width: _currentPage == index ? 18 : 8,
                            height: 8,
                            decoration: BoxDecoration(
                              color: _currentPage == index ? Colors.white : Colors.white30,
                              borderRadius: BorderRadius.circular(4),
                            ),
                          )),
                        ),
                        const SizedBox(height: 10),
                        Padding(
                          padding: const EdgeInsets.all(16.0),
                          child: ClipRRect(
                            borderRadius: BorderRadius.circular(32),
                            child: BackdropFilter(
                              filter: ImageFilter.blur(sigmaX: 30, sigmaY: 30),
                              child: Container(
                                padding: const EdgeInsets.symmetric(vertical: 14, horizontal: 8),
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(32),
                                  border: Border.all(color: Colors.white.withOpacity(0.2)),
                                ),
                                child: Row(
                                  mainAxisAlignment: MainAxisAlignment.spaceAround,
                                  children: [
                                    _buildDockIcon(Icons.phone, Colors.green),
                                    _buildDockIcon(Icons.message, Colors.lightBlue),
                                    _buildDockIcon(Icons.language, Colors.blue),
                                    _buildDockIcon(Icons.chat_bubble, Colors.teal),
                                  ],
                                ),
                              ),
                            ),
                          ),
                        ),
                      ],
                    ),
                  ),
                  AnimatedPositioned(
                    duration: const Duration(milliseconds: 400),
                    curve: Curves.fastOutSlowIn,
                    top: isControlCenterOpen ? 0 : -MediaQuery.of(context).size.height,
                    left: 0,
                    right: 0,
                    height: MediaQuery.of(context).size.height * 0.8,
                    child: _buildControlCenter(),
                  ),
                ],
              );
            }

            Widget _buildCompactIsland() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Icon(Icons.lens, color: Colors.green, size: 8),
                  Icon(Icons.bolt, color: Colors.amber, size: 12),
                ],
              );
            }

            Widget _buildExpandedIsland() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Row(
                    children: [
                      Icon(Icons.music_note, color: Colors.pinkAccent, size: 30),
                      SizedBox(width: 12),
                      Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('Liquid Waves', style: TextStyle(fontSize: 14, fontWeight: FontWeight.bold, color: Colors.white)),
                          Text('iOS Concept 2026', style: TextStyle(color: Colors.white60, fontSize: 12)),
                        ],
                      ),
                    ],
                  ),
                  Icon(Icons.equalizer, color: Colors.greenAccent, size: 24),
                ],
              );
            }

            Widget _buildAppGrid() {
              return Padding(
                padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 10),
                child: GridView.count(
                  crossAxisCount: 4,
                  mainAxisSpacing: 24,
                  crossAxisSpacing: 16,
                  physics: const NeverScrollableScrollPhysics(),
                  children: [
                    _buildAppIcon(Icons.camera_alt, 'Camera', Colors.grey, Colors.white24),
                    _buildAppIcon(Icons.settings, 'Settings', Colors.blueGrey, Colors.blueGrey.withOpacity(0.4)),
                    _buildAppIcon(Icons.mail, 'Mail', Colors.blue, Colors.blue.withOpacity(0.4)),
                    _buildAppIcon(Icons.map, 'Maps', Colors.green, Colors.green.withOpacity(0.4)),
                    _buildAppIcon(Icons.music_note, 'Music', Colors.pink, Colors.pink.withOpacity(0.4)),
                    _buildAppIcon(Icons.wallet, 'Wallet', Colors.indigo, Colors.indigo.withOpacity(0.4)),
                    _buildAppIcon(Icons.edit_note, 'Notes', Colors.amber, Colors.amber.withOpacity(0.4)),
                    _buildAppIcon(Icons.photo_library, 'Photos', Colors.orange, Colors.orange.withOpacity(0.4)),
                  ],
                ),
              );
            }

            Widget _buildWidgetPage() {
              return Padding(
                padding: const EdgeInsets.all(24.0),
                child: Center(
                  child: ClipRRect(
                    borderRadius: BorderRadius.circular(28),
                    child: BackdropFilter(
                      filter: ImageFilter.blur(sigmaX: 25, sigmaY: 25),
                      child: Container(
                        padding: const EdgeInsets.all(24),
                        decoration: BoxDecoration(
                          color: Colors.white.withOpacity(0.07),
                          borderRadius: BorderRadius.circular(28),
                          border: Border.all(color: Colors.white.withOpacity(0.12)),
                        ),
                        child: const Column(
                          mainAxisSize: MainAxisSize.min,
                          children: [
                            Text('09:41', style: TextStyle(fontSize: 64, fontWeight: FontWeight.w300, color: Colors.white)),
                            SizedBox(height: 8),
                            Text('Sunday, June 28, 2026', style: TextStyle(fontSize: 16, color: Colors.white70)),
                            SizedBox(height: 16),
                            Divider(color: Colors.white12),
                            SizedBox(height: 12),
                            Row(
                              mainAxisAlignment: MainAxisAlignment.spaceAround,
                              children: [
                                Column(
                                  children: [
                                    Icon(Icons.wb_sunny, color: Colors.orangeAccent),
                                    SizedBox(height: 4),
                                    Text('24°C', style: TextStyle(fontWeight: FontWeight.bold)),
                                  ],
                                ),
                                Column(
                                  children: [
                                    Icon(Icons.bolt, color: Colors.greenAccent),
                                    SizedBox(height: 4),
                                    Text('Optimized', style: TextStyle(fontWeight: FontWeight.bold)),
                                  ],
                                ),
                              ],
                            )
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }

            Widget _buildControlCenter() {
              return ClipRRect(
                child: BackdropFilter(
                  filter: ImageFilter.blur(sigmaX: 40, sigmaY: 40),
                  child: Container(
                    color: Colors.black.withOpacity(0.55),
                    padding: const EdgeInsets.fromLTRB(24, 60, 24, 20),
                    child: Column(
                      children: [
                        Row(
                          children: [
                            Expanded(
                              child: Container(
                                height: 140,
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(24),
                                  border: Border.all(color: Colors.white.withOpacity(0.1)),
                                ),
                                padding: const EdgeInsets.all(12),
                                child: GridView.count(
                                  crossAxisCount: 2,
                                  mainAxisSpacing: 12,
                                  crossAxisSpacing: 12,
                                  physics: const NeverScrollableScrollPhysics(),
                                  children: [
                                    _buildControlIcon(Icons.wifi, Colors.blue, true),
                                    _buildControlIcon(Icons.bluetooth, Colors.blue, true),
                                    _buildControlIcon(Icons.flight, Colors.orange, false),
                                    _buildControlIcon(Icons.signal_cellular_alt, Colors.green, true),
                                  ],
                                ),
                              ),
                            ),
                            const SizedBox(width: 16),
                            Expanded(
                              child: Container(
                                height: 140,
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(24),
                                  border: Border.all(color: Colors.white.withOpacity(0.1)),
                                ),
                                padding: const EdgeInsets.all(16),
                                child: const Column(
                                  mainAxisAlignment: MainAxisAlignment.center,
                                  children: [
                                    Text('Media Player', style: TextStyle(color: Colors.white60, fontSize: 12, fontWeight: FontWeight.bold)),
                                    SizedBox(height: 16),
                                    Row(
                                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                                      children: [
                                        Icon(Icons.skip_previous, size: 26),
                                        Icon(Icons.play_arrow, size: 32),
                                        Icon(Icons.skip_next, size: 26),
                                      ],
                                    )
                                  ],
                                ),
                              ),
                            ),
                          ],
                        ),
                        const SizedBox(height: 24),
                        Row(
                          children: [
                            Expanded(child: _buildVerticalSlider(Icons.wb_sunny, 'Brightness', brightnessValue, (val) => setState(() => brightnessValue = val))),
                            const SizedBox(width: 16),
                            Expanded(child: _buildVerticalSlider(Icons.volume_up, 'Volume', volumeValue, (val) => setState(() => volumeValue = val))),
                          ],
                        ),
                        const Spacer(),
                        GestureDetector(
                          onTap: () => setState(() => isControlCenterOpen = false),
                          child: Column(
                            children: [
                              const Text('Close Menu', style: TextStyle(color: Colors.white38, fontSize: 12)),
                              const SizedBox(height: 6),
                              Container(width: 65, height: 5, decoration: BoxDecoration(color: Colors.white38, borderRadius: BorderRadius.circular(2.5))),
                            ],
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _buildControlIcon(IconData icon, Color activeColor, bool isActive) {
              return Container(
                decoration: BoxDecoration(color: isActive ? activeColor : Colors.white10, shape: BoxShape.circle),
                child: Icon(icon, color: Colors.white, size: 20),
              );
            }

            Widget _buildVerticalSlider(IconData icon, String label, double value, ValueChanged<double> onChanged) {
              return Column(
                children: [
                  Container(
                    height: 140,
                    width: 75,
                    decoration: BoxDecoration(
                      color: Colors.white.withOpacity(0.08),
                      borderRadius: BorderRadius.circular(22),
                      border: Border.all(color: Colors.white.withOpacity(0.1)),
                    ),
                    child: Stack(
                      alignment: Alignment.bottomCenter,
                      children: [
                        FractionallySizedBox(
                          heightFactor: value,
                          child: Container(decoration: BoxDecoration(color: Colors.white.withOpacity(0.2), borderRadius: BorderRadius.circular(22))),
                        ),
                        Positioned.fill(
                          child: SliderTheme(
                            data: SliderThemeData(
                              trackHeight: 140,
                              thumbShape: SliderComponentShape.noThumb,
                              overlayShape: SliderComponentShape.noOverlay,
                              activeTrackColor: Colors.transparent,
                              inactiveTrackColor: Colors.transparent,
                            ),
                            child: RotatedBox(quarterTurns: 3, child: Slider(value: value, onChanged: onChanged)),
                          ),
                        ),
                        Positioned(bottom: 12, child: Icon(icon, color: Colors.white70, size: 22)),
                      ],
                    ),
                  ),
                  const SizedBox(height: 6),
                  Text(label, style: const TextStyle(color: Colors.white60, fontSize: 12)),
                ],
              );
            }

            Widget _buildAppIcon(IconData icon, String label, Color bgColor, Color shadowColor) {
              return Column(
                mainAxisSize: MainAxisSize.min,
                children: [
                  Container(
                    width: 60,
                    height: 60,
                    decoration: BoxDecoration(
                      color: bgColor,
                      borderRadius: BorderRadius.circular(16),
                      boxShadow: [
                        BoxShadow(color: shadowColor, blurRadius: 14, offset: const Offset(0, 4))
                      ],
                    ),
                    child: Icon(icon, color: Colors.white, size: 28),
                  ),
                  const SizedBox(height: 6),
                  Text(label, style: const TextStyle(color: Colors.white, fontSize: 12), overflow: TextOverflow.ellipsis),
                ],
              );
            }

            Widget _buildDockIcon(IconData icon, Color bgColor) {
              return Container(
                width: 60,
                height: 60,
                decoration: BoxDecoration(
                  color: bgColor.withOpacity(0.85),
                  borderRadius: BorderRadius.circular(18),
                  boxShadow: [
                    BoxShadow(color: bgColor.withOpacity(0.4), blurRadius: 12, offset: const Offset(0, 4))
                  ],
                ),
                child: Icon(icon, color: Colors.white, size: 28),
              );
            }
          }
          EOF

      - name: Fetch Packages
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Result Directly (No ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: ios-launcher-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0 # این خط فشرده‌سازی زپ را صفر می‌کند تا فایل مستقیماً به صورت APK خام دانلود شود
