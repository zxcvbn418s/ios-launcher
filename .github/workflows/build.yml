name: Build Production Android Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Recreate Android Project
        run: |
          rm -rf android
          flutter create --platforms android --org com.liquid.glasslauncher --project-name glass_launcher .

      - name: Inject Production Dependencies (pubspec.yaml)
        run: |
          cat << 'EOF' > pubspec.yaml
          name: glass_launcher
          description: "A Professional Production Liquid Glass iOS Launcher"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            device_apps: ^2.2.0
            permission_handler: ^11.3.1

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: Inject Full Functional Launcher Source Code
        run: |
          rm -f lib/main.dart
          mkdir -p lib
          
          cat << 'EOF' > lib/main.dart
          import 'dart:ui';
          import 'package:flutter/material.dart';
          import 'package:device_apps/device_apps.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() {
            runApp(const GlassLauncherApp());
          }

          class GlassLauncherApp extends StatelessWidget {
            const GlassLauncherApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Liquid Glass Launcher',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: Colors.black,
                  useMaterial3: true,
                ),
                home: const MainLauncherStructure(),
              );
            }
          }

          class MainLauncherStructure extends StatefulWidget {
            const MainLauncherStructure({super.key});

            @override
            State<MainLauncherStructure> createState() => _MainLauncherStructureState();
          }

          class _MainLauncherStructureState extends State<MainLauncherStructure> {
            bool _isLocked = true;
            bool _isControlCenterOpen = false;
            bool _isIslandExpanded = false;
            List<Application> _installedApps = [];
            bool _isLoadingApps = true;
            final PageController _pageController = PageController(initialPage: 0);
            int _currentPage = 0;

            @override
            void initState() {
              super.initState();
              _requestPermissionsAndLoadApps();
            }

            Future<void> _requestPermissionsAndLoadApps() async {
              await Permission.ignoreBatteryOptimizations.request();
              _loadApps();
            }

            Future<void> _loadApps() async {
              try {
                List<Application> apps = await DeviceApps.getInstalledApplications(
                  includeSystemApps: true,
                  onlyAppsWithLaunchIntent: true,
                  includeAppIcons: true,
                );
                apps.sort((a, b) => a.appName.toLowerCase().compareTo(b.appName.toLowerCase()));
                setState(() {
                  _installedApps = apps;
                  _isLoadingApps = false;
                });
              } catch (e) {
                setState(() => _isLoadingApps = false);
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    // Dynamic Liquid Wallpaper Gradient Background
                    Positioned.fill(
                      child: Container(
                        decoration: const BoxDecoration(
                          gradient: LinearGradient(
                            begin: Alignment.topLeft,
                            end: Alignment.bottomRight,
                            colors: [
                              Color(0xFF161726),
                              Color(0xFF112136),
                              Color(0xFF1D1429),
                              Color(0xFF07080C),
                            ],
                          ),
                        ),
                      ),
                    ),

                    // Main Operational Navigation Flow
                    _isLocked 
                      ? _buildLockScreen() 
                      : _buildMainWorkspace(),

                    // Slidably Accessible Control Center Overlay
                    AnimatedPositioned(
                      duration: const Duration(milliseconds: 380),
                      curve: Curves.fastOutSlowIn,
                      top: _isControlCenterOpen ? 0 : -MediaQuery.of(context).size.height,
                      left: 0,
                      right: 0,
                      height: MediaQuery.of(context).size.height,
                      child: _buildControlCenterWidget(),
                    ),
                  ],
                ),
              );
            }

            Widget _buildLockScreen() {
              return GestureDetector(
                onVerticalDragEnd: (details) {
                  if (details.primaryVelocity! < -100) {
                    setState(() => _isLocked = false);
                  }
                },
                child: Container(
                  color: Colors.transparent,
                  width: double.infinity,
                  height: double.infinity,
                  child: SafeArea(
                    child: Column(
                      children: [
                        const SizedBox(height: 50),
                        const Icon(Icons.lock_outline, color: Colors.white, size: 28),
                        const SizedBox(height: 12),
                        const Text(
                          '09:41',
                          style: TextStyle(fontSize: 86, fontWeight: FontWeight.w200, color: Colors.white, letterSpacing: -2),
                        ),
                        const Text(
                          'Sunday, June 28',
                          style: TextStyle(fontSize: 22, fontWeight: FontWeight.w400, color: Colors.white70),
                        ),
                        const Spacer(),
                        Container(
                          margin: const EdgeInsets.only(bottom: 40),
                          child: Column(
                            children: [
                              const Icon(Icons.keyboard_arrow_up, color: Colors.white60, size: 30),
                              Text(
                                'Swipe up to open',
                                style: TextStyle(color: Colors.white.withOpacity(0.7), fontSize: 16, fontWeight: FontWeight.w500),
                              ),
                            ],
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _buildMainWorkspace() {
              return SafeArea(
                child: Column(
                  children: [
                    // Persistent Custom System Top Bar
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 6),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.spaceBetween,
                        children: [
                          const Text('9:41', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15)),
                          GestureDetector(
                            onTap: () => setState(() => _isControlCenterOpen = true),
                            child: const Row(
                              children: [
                                Icon(Icons.signal_cellular_alt, size: 18),
                                SizedBox(width: 6),
                                Icon(Icons.wifi, size: 18),
                                SizedBox(width: 6),
                                Icon(Icons.battery_full, color: Colors.green, size: 18),
                                SizedBox(width: 4),
                                Text('85%', style: TextStyle(fontSize: 12, fontWeight: FontWeight.bold)),
                              ],
                            ),
                          ),
                        ],
                      ),
                    ),

                    // Interactive Dynamic Island System
                    GestureDetector(
                      onTap: () => setState(() => _isIslandExpanded = !_isIslandExpanded),
                      child: AnimatedContainer(
                        duration: const Duration(milliseconds: 320),
                        curve: Curves.fastOutSlowIn,
                        width: _isIslandExpanded ? MediaQuery.of(context).size.width * 0.92 : 110,
                        height: _isIslandExpanded ? 75 : 30,
                        decoration: BoxDecoration(
                          color: Colors.black,
                          borderRadius: BorderRadius.circular(24),
                        ),
                        padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 4),
                        child: _isIslandExpanded ? _expandedIslandContent() : _compactIslandContent(),
                      ),
                    ),
                    const SizedBox(height: 16),

                    // Horizontal Paged Grid System
                    Expanded(
                      child: PageView(
                        controller: _pageController,
                        onPageChanged: (int page) => setState(() => _currentPage = page),
                        children: [
                          _buildWidgetPageLayout(), // Page 1: Glassmorphic Widgets Screen
                          _buildProductionAppGrid(), // Page 2: Real System Applications Organizer
                        ],
                      ),
                    ),

                    // Page Position Pagination Indicators
                    Row(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: List.generate(2, (index) => AnimatedContainer(
                        duration: const Duration(milliseconds: 200),
                        margin: const EdgeInsets.symmetric(horizontal: 4),
                        width: _currentPage == index ? 16 : 8,
                        height: 8,
                        decoration: BoxDecoration(
                          color: _currentPage == index ? Colors.white : Colors.white30,
                          borderRadius: BorderRadius.circular(4),
                        ),
                      )),
                    ),
                    const SizedBox(height: 12),

                    // Bottom Permanent Glass Dock Area
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 12),
                      child: ClipRRect(
                        borderRadius: BorderRadius.circular(30),
                        child: BackdropFilter(
                          filter: ImageFilter.blur(sigmaX: 25, sigmaY: 25),
                          child: Container(
                            padding: const EdgeInsets.symmetric(vertical: 14, horizontal: 12),
                            decoration: BoxDecoration(
                              color: Colors.white.withOpacity(0.07),
                              borderRadius: BorderRadius.circular(30),
                              border: Border.all(color: Colors.white.withOpacity(0.15)),
                            ),
                            child: Row(
                              mainAxisAlignment: MainAxisAlignment.spaceAround,
                              children: _buildStaticDockIcons(),
                            ),
                          ),
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }

            Widget _compactIslandContent() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Icon(Icons.lens, color: Colors.green, size: 7),
                  Icon(Icons.bolt, color: Colors.amber, size: 11),
                ],
              );
            }

            Widget _expandedIslandContent() {
              return const Row(
                mainAxisAlignment: MainAxisAlignment.spaceBetween,
                children: [
                  Row(
                    children: [
                      Icon(Icons.radio, color: Colors.deepOrangeAccent, size: 28),
                      SizedBox(width: 12),
                      Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('System Operational', style: TextStyle(fontSize: 13, fontWeight: FontWeight.bold, color: Colors.white)),
                          Text('Liquid Glass Active', style: TextStyle(color: Colors.white60, fontSize: 11)),
                        ],
                      ),
                    ],
                  ),
                  Icon(Icons.bar_chart, color: Colors.greenAccent, size: 22),
                ],
              );
            }

            Widget _buildWidgetPageLayout() {
              return Padding(
                padding: const EdgeInsets.all(24.0),
                child: Center(
                  child: ClipRRect(
                    borderRadius: BorderRadius.circular(28),
                    child: BackdropFilter(
                      filter: ImageFilter.blur(sigmaX: 25, sigmaY: 25),
                      child: Container(
                        padding: const EdgeInsets.all(24),
                        decoration: BoxDecoration(
                          color: Colors.white.withOpacity(0.06),
                          borderRadius: BorderRadius.circular(28),
                          border: Border.all(color: Colors.white.withOpacity(0.12)),
                        ),
                        child: const Column(
                          mainAxisSize: MainAxisSize.min,
                          children: [
                            Text('09:41', style: TextStyle(fontSize: 64, fontWeight: FontWeight.w300, color: Colors.white, letterSpacing: -1)),
                            SizedBox(height: 4),
                            Text('Sunday, June 28, 2026', style: TextStyle(fontSize: 16, color: Colors.white70)),
                            SizedBox(height: 16),
                            Divider(color: Colors.white12, height: 1),
                            SizedBox(height: 16),
                            Row(
                              mainAxisAlignment: MainAxisAlignment.spaceAround,
                              children: [
                                Column(
                                  children: [
                                    Icon(Icons.wb_sunny, color: Colors.orangeAccent, size: 26),
                                    SizedBox(height: 6),
                                    Text('24°C', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15)),
                                  ],
                                ),
                                Column(
                                  children: [
                                    Icon(Icons.bolt, color: Colors.greenAccent, size: 26),
                                    SizedBox(height: 6),
                                    Text('Optimized', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 15)),
                                  ],
                                ),
                              ],
                            )
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }

            Widget _buildProductionAppGrid() {
              if (_isLoadingApps) {
                return const Center(child: CircularProgressIndicator(color: Colors.white));
              }
              if (_installedApps.isEmpty) {
                return const Center(child: Text('No applications found. Check permissions.'));
              }

              return GridView.builder(
                padding: const EdgeInsets.symmetric(horizontal: 20, vertical: 12),
                itemCount: _installedApps.length,
                gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                  crossAxisCount: 4,
                  mainAxisSpacing: 20,
                  crossAxisSpacing: 16,
                  childAspectRatio: 0.82,
                ),
                itemBuilder: (context, index) {
                  Application app = _installedApps[index];
                  return GestureDetector(
                    onTap: () => DeviceApps.openApp(app.packageName),
                    child: Column(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        Container(
                          width: 58,
                          height: 58,
                          decoration: BoxDecoration(
                            borderRadius: BorderRadius.circular(15),
                            boxShadow: [
                              BoxShadow(color: Colors.black.withOpacity(0.25), blurRadius: 8, offset: const Offset(0, 3))
                            ],
                          ),
                          child: ClipRRect(
                            borderRadius: BorderRadius.circular(15),
                            child: app is ApplicationWithIcon 
                              ? Image.memory(app.icon, fit: BoxFit.cover)
                              : const Icon(Icons.android, size: 32, color: Colors.green),
                          ),
                        ),
                        const SizedBox(height: 6),
                        Text(
                          app.appName,
                          style: const TextStyle(color: Colors.white, fontSize: 11, fontWeight: FontWeight.w400),
                          maxLines: 1,
                          overflow: TextOverflow.ellipsis,
                          textAlign: TextAlign.center,
                        ),
                      ],
                    ),
                  );
                },
              );
            }

            List<Widget> _buildStaticDockIcons() {
              final Map<IconData, Color> dockIcons = {
                Icons.phone: Colors.green,
                Icons.message: Colors.lightBlue,
                Icons.language: Colors.blueAccent,
                Icons.chat_bubble: Colors.teal,
              };

              return dockIcons.entries.map((entry) {
                return Container(
                  width: 56,
                  height: 56,
                  decoration: BoxDecoration(
                    color: entry.value.withOpacity(0.85),
                    borderRadius: BorderRadius.circular(16),
                  ),
                  child: Icon(entry.key, color: Colors.white, size: 26),
                );
              }).toList();
            }

            Widget _buildControlCenterWidget() {
              return ClipRRect(
                child: BackdropFilter(
                  filter: ImageFilter.blur(sigmaX: 35, sigmaY: 35),
                  child: Container(
                    color: Colors.black.withOpacity(0.6),
                    padding: const EdgeInsets.fromLTRB(24, 60, 24, 30),
                    child: Column(
                      children: [
                        Row(
                          children: [
                            Expanded(
                              child: Container(
                                height: 135,
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(20),
                                  border: Border.all(color: Colors.white.withOpacity(0.1)),
                                ),
                                padding: const EdgeInsets.all(12),
                                child: GridView.count(
                                  crossAxisCount: 2,
                                  mainAxisSpacing: 10,
                                  crossAxisSpacing: 10,
                                  physics: const NeverScrollableScrollPhysics(),
                                  children: [
                                    _ccToggleIcon(Icons.wifi, Colors.blue, true),
                                    _ccToggleIcon(Icons.bluetooth, Colors.blue, true),
                                    _ccToggleIcon(Icons.flight, Colors.orange, false),
                                    _ccToggleIcon(Icons.signal_cellular_alt, Colors.green, true),
                                  ],
                                ),
                              ),
                            ),
                            const SizedBox(width: 16),
                            Expanded(
                              child: Container(
                                height: 135,
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.08),
                                  borderRadius: BorderRadius.circular(20),
                                  border: Border.all(color: Colors.white.withOpacity(0.1)),
                                ),
                                padding: const EdgeInsets.all(16),
                                child: const Column(
                                  mainAxisAlignment: MainAxisAlignment.center,
                                  children: [
                                    Text('Media Control', style: TextStyle(color: Colors.white54, fontSize: 12, fontWeight: FontWeight.bold)),
                                    Spacer(),
                                    Row(
                                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                                      children: [
                                        Icon(Icons.skip_previous, size: 24),
                                        Icon(Icons.play_arrow, size: 30),
                                        Icon(Icons.skip_next, size: 24),
                                      ],
                                    ),
                                    Spacer(),
                                  ],
                                ),
                              ),
                            ),
                          ],
                        ),
                        const Spacer(),
                        GestureDetector(
                          onTap: () => setState(() => _isControlCenterOpen = false),
                          child: Column(
                            mainAxisSize: MainAxisSize.min,
                            children: [
                              const Text('Close Control Panel', style: TextStyle(color: Colors.white30, fontSize: 12)),
                              const SizedBox(height: 8),
                              Container(width: 60, height: 5, decoration: BoxDecoration(color: Colors.white30, borderRadius: BorderRadius.circular(2.5))),
                            ],
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }

            Widget _ccToggleIcon(IconData icon, Color activeColor, bool isActive) {
              return Container(
                decoration: BoxDecoration(color: isActive ? activeColor : Colors.white12, shape: BoxShape.circle),
                child: Icon(icon, color: Colors.white, size: 18),
              );
            }
          }
          EOF

      - name: Fetch Environment Packages
        run: flutter pub get

      - name: Build Application Binary APK
        run: flutter build apk --release

      - name: Create Production Release Target
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.1.${{ github.run_number }}"
          name: "iOS Launcher Liquid Glass Production Build"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
