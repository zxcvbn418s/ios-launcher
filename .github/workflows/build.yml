name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Specific Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Force Clean and Recreate Modern Android Structure
        run: |
          # پاک کردن پوشه قدیمی اندروید برای حذف کامل v1 embedding
          rm -rf android
          # ساخت مجدد پوشه اندروید با ساختار کاملاً مدرن و v2
          flutter create --platforms android --org com.example.ioslauncher --project-name ios_launcher .

      - name: Fetch Packages
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: ios-launcher-apk
          path: build/app/outputs/flutter-apk/app-release.apk
