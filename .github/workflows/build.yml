name: Build Modular Liquid Glass Launcher

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Force Clean and Recreate Android Base
        run: |
          rm -rf android
          flutter create --platforms android --org com.zxcvbn418s --project-name ioslauncher .

      - name: Fix and Inject MainActivity.kt in Perfect Path
        run: |
          # پاک کردن مسیرهای اشتباه قبلی برای جلوگیری از تداخل پکیج‌ها
          rm -rf android/app/src/main/kotlin/com/example
          
          # ساختن مسیر پوشه دقیق بر اساس شناسه رسمی پروژه شما
          mkdir -p android/app/src/main/kotlin/com/zxcvbn418s/ioslauncher
          
          cat << 'EOF' > android/app/src/main/kotlin/com/zxcvbn418s/ioslauncher/MainActivity.kt
          package com.zxcvbn418s.ioslauncher

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity() {
          }
          EOF

      - name: Fix and Inject Complete AndroidManifest.xml (No More Empty File)
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.zxcvbn418s.ioslauncher">
              
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES"/>
              <uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/>
              
              <application
                  android:label="Liquid Glass OS"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleInstance"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.HOME" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Sync Dependencies
        run: flutter pub get

      - name: Run Build Production APK
        run: flutter build apk --release

      - name: Upload Fixed Architecture Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlassLauncher-PathFixed
          path: build/app/outputs/flutter-apk/app-release.apk
